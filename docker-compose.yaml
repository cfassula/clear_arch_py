version: '3'

services:
  app:
    build: .
    container_name: template-python
    command: .docker/zsh/start-app.sh
    volumes:
      - .:/home/python/app
    ports:
      - "8000:8000"
  
  db:
    platform: linux/x86_64
    image: mysql:8.0.30-debian
    container_name: clean-arch-db
    environment:
      - MYSQL_DATABASE=cap-db
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./.docker/dbdata:/var/lib/mysql:delegated

  db_test:
    platform: linux/x86_64
    image: mysql:8.0.30-debian
    container_name: clean-arch-db-test
    environment:
      - MYSQL_DATABASE=cap-db-test
      - MYSQL_ROOT_PASSWORD=root
    tmpfs:
      - /var/lib/mysql
